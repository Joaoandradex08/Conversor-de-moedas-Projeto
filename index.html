<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title> Conversor de Moedas </title>
</head>

<body>
    <img class="logo" src="./assets/logo.gif" alt="logo-conversor-de-moedas">

    <main>
        <label>
            Converter <b> de </b>
            <select class="currency-select-convert">
                <option value="real"> R$ Real Brasileiro </option>
                <option value="dolar"> US$ Dólar Americano </option>
                <option value="euro"> € Euro </option>
                <option value="libra"> £ Libra </option>
                <option value="yuanchinese"> 元 Yuan Chinês </option>
            </select>
        </label>

        <label>
            Converter <b> para </b>
            <select class="currency-select-converted">
                <option value="dolar"> US$ Dólar Americano </option>
                <option value="real"> R$ Real Brasileiro </option>
                <option value="euro"> € Euro </option>
                <option value="libra"> £ Libra </option>
                <option value="yuanchinese"> 元 Yuan Chinês </option>
            </select>
        </label>

        <label>
            Valor
            <input class="input-currency" placeholder="R$ 10.000,00">
        </label>

        <button class="convert-button"> Converter </button>

        <section>
            <div class="currency-box">
                <img class="currency-img-br"  src="./assets/Bandeira Brasil.png" alt="logo-moeda-a-converter">
                <p class="currency-convert" > Real brasileiro </p>
                <p class="currency-value-to-convert"> R$ 0,00 </p>
            </div>

            
            <img class="arrow" src="./assets/Flecha.png" alt="flecha">
            
            <div class="currency-box">
                <img class="currency-img" src="./assets/Bandeira EUA.png" alt="logo-moeda-convertida">
                <p class="currency" id="currency-name"> Dólar americano </p>
                <p class="currency-value"> US$ 0,00 </p>
            </div>

        </section>


    </main>

</body>

<script src="./scripts.js"></script>

</html>
